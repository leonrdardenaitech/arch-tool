<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Builder 007</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="brand-builder-app" class="app-container">
        
        <!-- PHASE 1: INPUT UI -->
        <div id="input-section" class="card fade-in">
            <h1 class="logo">BRAND BUILDER <span>007</span></h1>
            <p class="subtitle">Architect your brand vision in 15 seconds.</p>
            <div class="input-group">
                <label>What is your Brand idea?</label>
                <input type="text" id="brand-idea" placeholder="e.g. A sustainable coffee brand using recycled materials...">
            </div>
            <div class="input-group">
                <label>Why do we need your brand?</label>
                <input type="text" id="brand-why" placeholder="e.g. Current coffee packaging is wasteful and non-recyclable...">
            </div>
            <button onclick="generateBrandVision()" class="btn-generate">Generate Brand Vision</button>
        </div>

        <!-- PHASE 2: LOADING/CAROUSEL UI -->
        <div id="carousel-section" style="display: none;" class="carousel-container">
            <div class="analysis-status">
                <div class="spinner"></div>
                <h3 id="loading-text">Agent 007 is analyzing market data...</h3>
            </div>
            <div class="image-wrapper">
                <img id="carousel-image" src="" alt="Brand Mockup">
                <div class="image-label" id="carousel-label">Billboard Visualization</div>
            </div>
        </div>

        <!-- PHASE 3: REVEAL PHASE / EMAIL REPORT -->
        <div id="email-report-section" style="display: none;" class="fade-in">
            <div class="email-container" id="report-content-to-print">
                <div class="email-header">
                    <p><strong>To:</strong> You</p>
                    <p><strong>From:</strong> AI Agent 007</p>
                    <p class="subject-line"><strong>Subject:</strong> Market Intelligence Report: <span id="display-brand-name"></span></p>
                </div>
                <div class="email-body">
                    <img id="email-attachment" src="" alt="Newspaper Mockup" class="email-attachment-img">
                    <div id="ai-report-body">
                        <!-- AI content will be injected here -->
                    </div>
                    <p class="email-signature">Best regards,<br><strong>AI Agent 007</strong></p>
                </div>
            </div>

            <div class="action-buttons">
                <button onclick="downloadReport()" class="btn-download">
                    📥 Download Brand Brief (PDF)
                </button>
                <button onclick="location.reload()" class="btn-secondary">Build Another Vision</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
